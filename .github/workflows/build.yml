name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace 2>&1 | tee build-output.txt; exit ${PIPESTATUS[0]}

      - name: Commit build log on failure
        if: failure()
        run: |
          tail -c 60000 build-output.txt > buildlog.txt
          git config user.name "build-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f buildlog.txt
          git commit -m "build log [skip ci]"
          git push

      - name: Publish APK to repo
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk interval-alarm.apk
          git config user.name "build-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase
          git add -f interval-alarm.apk
          git commit -m "Publish APK [skip ci]"
          git push

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: interval-alarm-apk
          path: app/build/outputs/apk/debug/app-debug.apk
